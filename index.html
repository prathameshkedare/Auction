<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Players — Cricket Auction System</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAV -->
  <nav class="navbar">
    <a href="index.html" class="nav-brand">🏏 <span>Cricket</span>Auction</a>
    <div class="nav-links">
      <a href="index.html" class="nav-link active">Players</a>
      <a href="teams.html" class="nav-link">Teams</a>
    </div>
  </nav>

  <div class="page">

    <!-- HEADER -->
    <div class="page-header">
      <div>
        <div class="page-title">Player <span>Auction</span></div>
        <div class="page-subtitle">Manage and bid on cricket players across all teams</div>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats-strip">
      <div class="stat-box">
        <div class="stat-label">Total Players</div>
        <div class="stat-value amber" id="stat-total">—</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Total Spent</div>
        <div class="stat-value green" id="stat-spent">—</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Teams Active</div>
        <div class="stat-value" id="stat-teams">—</div>
      </div>
    </div>

    <!-- ADD / EDIT FORM -->
    <div class="card">
      <div class="card-title">➕ Add / Edit Player</div>
      <input type="hidden" id="id">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Player Name</label>
          <input type="text" id="playerName" placeholder="e.g. Virat Kohli">
        </div>
        <div class="form-group">
          <label class="form-label">Team</label>
          <select id="teamName">
            <option value="">Select Team</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Bid Price (₹)</label>
          <input type="number" id="price" placeholder="e.g. 1500000" min="0">
        </div>
        <div class="form-group" style="display:flex; gap:8px; align-items:flex-end;">
          <button class="btn btn-primary" onclick="saveData()">💾 Save Player</button>
          <button class="btn btn-secondary" onclick="clearForm()">✕ Clear</button>
        </div>
      </div>
    </div>

    <!-- SEARCH + FILTER -->
    <div class="card">
      <div class="card-title">🔍 Search & Filter</div>
      <div class="search-bar">
        <div class="search-input-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="Search by player name..." oninput="applyFilter()">
        </div>
        <select class="filter-select" id="filterTeam" onchange="applyFilter()">
          <option value="">All Teams</option>
        </select>
        <button class="btn btn-secondary" onclick="document.getElementById('searchInput').value=''; document.getElementById('filterTeam').selectedIndex=0; applyFilter();">Clear</button>
      </div>
    </div>

    <!-- PLAYERS TABLE -->
    <div class="card">
      <div class="card-title">📋 Player Roster</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Player</th>
              <th>Team</th>
              <th>Price 💰</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="5">
              <div class="loading-state">
                <div class="spinner"></div>
                <div>Loading players...</div>
              </div>
            </td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- TOAST -->
  <div id="toast"></div>

  <script src="js/script.js"></script>
</body>
</html>
